supergraph:
  listen: 0.0.0.0:4000
  # Introspection on by default for local dev (Sandbox needs it).
  # Production must flip this off — the published, versioned SDL is
  # the supported partner contract instead. Override via the
  # LUXE_INTROSPECTION env var (see README ▸ Security).
  introspection: ${env.LUXE_INTROSPECTION:-true}

sandbox:
  # Sandbox needs introspection; co-gate them.
  enabled: ${env.LUXE_SANDBOX_ENABLED:-true}

# ── Gateway-side JWT validation (scaffold) ────────────────────────────────
# Uncomment + populate router/keys/jwks.json to have the router
# validate every inbound Authorization: Bearer <token> against a
# JWKS, rejecting invalid tokens before any subgraph is dialled.
#
# Subgraphs today validate JWT themselves (common/auth/JwtService) —
# defense-in-depth, but extra parsing cost at high QPS. To switch to
# gateway-only validation:
#   1. Generate an RS256 keypair; private to JwtService, public as JWK
#   2. Update JwtService.generateToken to use RS256
#   3. Uncomment this block; restart router
#   4. Switch SubgraphAuthInterceptor to trust x-luxe-claims headers
#      instead of re-parsing the JWT
#
# authentication:
#   router:
#     jwt:
#       jwks:
#         - url: file:///./router/keys/jwks.json
#       sources:
#         - source: header
#           name: Authorization
#           value_prefix: Bearer
#       header_name: x-luxe-claims
#       on_error: Continue

homepage:
  enabled: false

health_check:
  listen: 0.0.0.0:8088
  enabled: true
  path: /health

cors:
  policies:
    - origins:
        - http://localhost:3000
        - https://studio.apollographql.com
        - https://luxehotels.com
      methods:
        - GET
        - POST
        - OPTIONS
      allow_headers:
        - Content-Type
        - Authorization
        - x-request-id
        - x-correlation-id
      allow_credentials: false

headers:
  all:
    request:
      - propagate:
          named: authorization
      - propagate:
          named: x-request-id
      - propagate:
          named: x-correlation-id

# ── Router-side rate limiting ─────────────────────────────────────────────
# First defense layer (per-IP) — the subgraph-side RateLimitFilter
# (common/security/RateLimitFilter) is the second (per-user). The
# router's built-in limiter is a leaky-bucket; the subgraph's is a
# Bucket4j token bucket. Together they bracket anonymous bursts on
# the outside and account-level abuse on the inside.
traffic_shaping:
  router:
    global_rate_limit:
      capacity: 1000           # 1000 req/window
      interval: 60s            # rolling 60s window
  all:
    timeout: 30s

# ── Automatic Persisted Queries (Tier 1 cache) ──────────────────────────
# Client sends a SHA-256 hash of the query; first time the router
# responds with PersistedQueryNotFound, the client retries with the
# body, and the router caches the (hash → body) entry. Subsequent
# requests skip the body. Cuts request size 70-90% on warm clients
# and lets the router serve GETs (which are then CDN-cacheable). Pure
# optimisation — no correctness risk because the hash is verified.
apq:
  enabled: true
  router:
    cache:
      in_memory:
        limit: 1000         # ~1k distinct operations in-flight; tune for prod

# ── Safelisted persisted queries (scaffold) ─────────────────────────────
# Separate feature from APQ: pins the router to a published operation
# registry, rejecting anything not in the manifest. Production flip
# once the manifest is stable. `log_unknown` first reports queries
# that aren't yet in the safelist so you can wave them through one by
# one without breaking clients during rollout.
#
# persisted_queries:
#   enabled: true
#   safelist:
#     enabled: false      # flip to true once the manifest is reviewed
#     require_id: false   # accept inline queries during rollout
#   log_unknown: true

# Surface subgraph errors during local dev so we can diagnose federation calls
include_subgraph_errors:
  all: true

override_subgraph_url:
  property:      http://localhost:4001/graphql
  guest:         http://localhost:4002/graphql
  pricing:       http://localhost:4003/graphql
  reservations:  http://localhost:4004/graphql
  loyalty:       http://localhost:4005/graphql
  content:       http://localhost:4006/graphql
  experiences:   http://localhost:4007/graphql
  meetings:      http://localhost:4008/graphql
  notifications: http://localhost:4009/graphql
  corporate:     http://localhost:4010/graphql
