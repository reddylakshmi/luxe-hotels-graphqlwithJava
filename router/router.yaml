supergraph:
  listen: 0.0.0.0:4000
  # Introspection on by default for local dev (Sandbox needs it).
  # Production must flip this off — the published, versioned SDL is
  # the supported partner contract instead. Override via the
  # LUXE_INTROSPECTION env var (see README ▸ Security).
  introspection: ${env.LUXE_INTROSPECTION:-true}
  # Query plan cache. In-memory by default (free); for a multi-
  # instance / multi-region deployment swap to Redis so a router
  # restart doesn't replan every operation from scratch. 4096
  # comfortably holds the distinct operation × variables shapes a
  # 30-brand consumer surface emits; default of 512 was tuned for
  # tiny demo apps.
  query_planning:
    cache:
      in_memory:
        limit: 4096
      # redis:
      #   urls: ["redis://localhost:6379"]
      #   ttl: 24h
      #   namespace: "luxe:qp"

sandbox:
  # Sandbox needs introspection; co-gate them.
  enabled: ${env.LUXE_SANDBOX_ENABLED:-true}

# ── Gateway-side JWT validation (scaffold) ────────────────────────────────
# Uncomment + populate router/keys/jwks.json to have the router
# validate every inbound Authorization: Bearer <token> against a
# JWKS, rejecting invalid tokens before any subgraph is dialled.
#
# Subgraphs today validate JWT themselves (common/auth/JwtService) —
# defense-in-depth, but extra parsing cost at high QPS. To switch to
# gateway-only validation:
#   1. Generate an RS256 keypair; private to JwtService, public as JWK
#   2. Update JwtService.generateToken to use RS256
#   3. Uncomment this block; restart router
#   4. Switch SubgraphAuthInterceptor to trust x-luxe-claims headers
#      instead of re-parsing the JWT
#
# authentication:
#   router:
#     jwt:
#       jwks:
#         - url: file:///./router/keys/jwks.json
#       sources:
#         - source: header
#           name: Authorization
#           value_prefix: Bearer
#       header_name: x-luxe-claims
#       on_error: Continue

homepage:
  enabled: false

health_check:
  listen: 0.0.0.0:8088
  enabled: true
  path: /health

cors:
  policies:
    - origins:
        - http://localhost:3000
        - https://studio.apollographql.com
        - https://luxehotels.com
      methods:
        - GET
        - POST
        - OPTIONS
      allow_headers:
        - Content-Type
        - Authorization
        - x-request-id
        - x-correlation-id
      allow_credentials: false

headers:
  all:
    request:
      - propagate:
          named: authorization
      - propagate:
          named: x-request-id
      - propagate:
          named: x-correlation-id

# ── Router-side rate limiting ─────────────────────────────────────────────
# First defense layer (per-IP) — the subgraph-side RateLimitFilter
# (common/security/RateLimitFilter) is the second (per-user). The
# router's built-in limiter is a leaky-bucket; the subgraph's is a
# Bucket4j token bucket. Together they bracket anonymous bursts on
# the outside and account-level abuse on the inside.
traffic_shaping:
  router:
    global_rate_limit:
      capacity: 1000           # 1000 req/window
      interval: 60s            # rolling 60s window
  all:
    timeout: 30s
    # In-flight subgraph request dedup. Two identical concurrent
    # subgraph calls collapse into one upstream fetch — both
    # callers wake on the shared response. Free-tier, no infra,
    # high payoff under bursty traffic (the most-loved hotel in
    # 9000 properties will see request piles during a sale).
    deduplicate_query: true

# ── Automatic Persisted Queries (Tier 1 cache) ──────────────────────────
# Client sends a SHA-256 hash of the query; first time the router
# responds with PersistedQueryNotFound, the client retries with the
# body, and the router caches the (hash → body) entry. Subsequent
# requests skip the body. Cuts request size 70-90% on warm clients
# and lets the router serve GETs (which are then CDN-cacheable). Pure
# optimisation — no correctness risk because the hash is verified.
apq:
  enabled: true
  router:
    cache:
      in_memory:
        limit: 1000         # ~1k distinct operations in-flight; tune for prod

# ── Federation entity cache (Apollo Router Enterprise) ──────────────────
# When a query selects fields across subgraphs, the router fans out
# _entities representations to each owner. The entity cache stores
# the resolved sub-objects in Redis keyed by (subgraph, type, repr)
# so the next request that lands on the SAME entity skips the
# subgraph round-trip entirely. At 30 brands / 9000 hotels this is
# the biggest single latency win on warm paths — popular hotels +
# brands are read thousands of times per minute.
#
# Strategy:
#   • subgraph.all default: enabled with a 30 s safety TTL — any
#     subgraph that doesn't override below gets short-lived caching.
#   • property      : 5 min — brand / hotel / room-type catalog.
#   • content       : 5 min — CMS articles, brand stories.
#   • pricing       : 30 s  — availability + rates churn; rely on
#                     subgraph Cache-Control headers to refine.
#   • reservations  : disabled — per-user write-side data.
#   • loyalty       : disabled — points balance must be live.
#   • guest         : disabled — profile/PII; can't share across users.
#   • meetings      : disabled — RFP state per-user.
#   • notifications : disabled — inbox state per-user.
#   • corporate     : disabled — per-account / per-user.
#   • experiences   : 1 min   — restaurant / spa metadata, slowly changing.
#
# Per-resolver overrides: subgraphs can emit a `Cache-Control` HTTP
# header (Apollo standard) and that takes precedence over the TTL
# below. e.g. PropertyDataFetcher could return
# `Cache-Control: max-age=3600` on Brand reads after the in-process
# Caffeine cache hits, layering the router cache on top.
#
# Gating: this block is Apollo Router Enterprise — the unlicensed
# build will refuse to enable it. Local dev runs with enabled: false
# and the in-process Caffeine cache (Tier 1) does the catalog work.
# Production switches enabled: true and supplies APOLLO_KEY +
# APOLLO_GRAPH_REF, OR an offline license via --license.
# Uncomment when:
#   1. Apollo Router Enterprise license is provisioned
#      (APOLLO_KEY + APOLLO_GRAPH_REF env vars, or --license file).
#   2. Redis is reachable on the URL below (docker-compose service
#      shipped in this repo binds it on localhost:6379).
# preview_entity_cache:
#   enabled: true
#   subgraph:
#     all:
#       enabled: true
#       ttl: 30s
#       redis:
#         urls: ["redis://localhost:6379"]
#         timeout: 500ms
#         namespace: "luxe:ec"
#     subgraphs:
#       property:      { ttl: 5m }      # catalog
#       content:       { ttl: 5m }      # CMS
#       pricing:       { ttl: 30s }     # availability — Cache-Control overrides
#       experiences:   { ttl: 1m }      # restaurants / spas
#       reservations:  { enabled: false }   # per-user
#       loyalty:       { enabled: false }   # live balance
#       guest:         { enabled: false }   # PII
#       meetings:      { enabled: false }   # per-user RFP state
#       notifications: { enabled: false }   # per-user inbox
#       corporate:     { enabled: false }   # per-account

# ── Safelisted persisted queries (scaffold) ─────────────────────────────
# Separate feature from APQ: pins the router to a published operation
# registry, rejecting anything not in the manifest. Production flip
# once the manifest is stable. `log_unknown` first reports queries
# that aren't yet in the safelist so you can wave them through one by
# one without breaking clients during rollout.
#
# persisted_queries:
#   enabled: true
#   safelist:
#     enabled: false      # flip to true once the manifest is reviewed
#     require_id: false   # accept inline queries during rollout
#   log_unknown: true

# Surface subgraph errors during local dev so we can diagnose federation calls
include_subgraph_errors:
  all: true

override_subgraph_url:
  property:      http://localhost:4001/graphql
  guest:         http://localhost:4002/graphql
  pricing:       http://localhost:4003/graphql
  reservations:  http://localhost:4004/graphql
  loyalty:       http://localhost:4005/graphql
  content:       http://localhost:4006/graphql
  experiences:   http://localhost:4007/graphql
  meetings:      http://localhost:4008/graphql
  notifications: http://localhost:4009/graphql
  corporate:     http://localhost:4010/graphql
