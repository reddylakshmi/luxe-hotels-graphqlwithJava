server:
  port: ${PORT:4009}
  threads:
    virtual:
      enabled: true

spring:
  application:
    name: luxe-notifications-service
  profiles:
    default: local
  graphql:
    graphiql:
      enabled: true
    path: /graphql
    schema:
      inspection:
        enabled: false

luxe:
  jwt:
    secret: ${JWT_SECRET:luxe-hotels-super-secret-key-minimum-256-bits-long}
  # Backend API URL — empty value means: use in-memory mock data.
  # To target a real backend, paste its URL into the matching profile
  # block below, or set the env var LUXE_NOTIFICATIONS_BACKEND_URL.
  backend:
    base-url: ${LUXE_NOTIFICATIONS_BACKEND_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Profile overrides ───────────────────────────────────────────────────

---
spring:
  config:
    activate:
      on-profile: local
luxe:
  backend:
    base-url: ""                                  # local: always mock

logging:
  level:
    com.luxe: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
luxe:
  backend:
    base-url: ${LUXE_NOTIFICATIONS_BACKEND_URL:}  # paste DEV URL or set env var

---
spring:
  config:
    activate:
      on-profile: stage
luxe:
  backend:
    base-url: ${LUXE_NOTIFICATIONS_BACKEND_URL:}  # paste STAGE URL or set env var

---
spring:
  config:
    activate:
      on-profile: prod
luxe:
  backend:
    base-url: ${LUXE_NOTIFICATIONS_BACKEND_URL:}  # paste PROD URL or set env var
