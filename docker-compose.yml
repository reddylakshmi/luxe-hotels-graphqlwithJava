      test: ["CMD", "curl", "-f", "http://localhost:4010/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Apollo Router ──────────────────────────────────────────────────────────

  router:
    image: ghcr.io/apollographql/router:v1.52.0
    ports:
      - "4000:4000"
      - "8088:8088"
    volumes:
      - ./router/router.yaml:/dist/config/router.yaml
      - ./supergraph.schema:/dist/schema/supergraph.graphqls
    environment:
      - APOLLO_ROUTER_CONFIG_PATH=/dist/config/router.yaml
      - APOLLO_ROUTER_SUPERGRAPH_PATH=/dist/schema/supergraph.graphqls
    depends_on:
      subgraph-property:
        condition: service_healthy
      subgraph-guest:
        condition: service_healthy
      subgraph-pricing:
        condition: service_healthy
      subgraph-reservations:
        condition: service_healthy
      subgraph-loyalty:
        condition: service_healthy
      subgraph-content:
        condition: service_healthy
      subgraph-experiences:
        condition: service_healthy
      subgraph-meetings:
        condition: service_healthy
      subgraph-notifications:
        condition: service_healthy
      subgraph-corporate:
        condition: service_healthy
