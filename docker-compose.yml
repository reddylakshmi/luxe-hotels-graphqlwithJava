version: "3.9"

services:

  # ── Redis (Tier 2 rate-limit / future entity cache) ───────────────────────
  # Single-node here for local dev; production targets Redis Cluster
  # (ElastiCache / Memorystore / Azure Cache). Subgraphs only talk Redis
  # when luxe.security.rate-limit.backend=redis is set.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  # ── Subgraphs ──────────────────────────────────────────────────────────────

  subgraph-property:
    build:
      context: .
      dockerfile: subgraph-property/Dockerfile
    ports:
      - "4001:4001"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  subgraph-guest:
    build:
      context: .
      dockerfile: subgraph-guest/Dockerfile
    ports:
      - "4002:4002"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  subgraph-pricing:
